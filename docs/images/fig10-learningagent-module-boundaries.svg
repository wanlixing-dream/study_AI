<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">LearningAgent module boundaries for Study AI</title>
  <desc id="desc">Ports and adapters boundary map for integrating LearningAgent into Study AI.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.layer{fill:#ffffff;stroke:#334155;stroke-width:1.4;rx:10}.title{font:700 18px Arial;fill:#0f172a}.layerTitle{font:700 15px Arial;fill:#111827}.box{fill:#eff6ff;stroke:#2563eb;stroke-width:1.2;rx:6}.port{fill:#fefce8;stroke:#ca8a04;stroke-width:1.2;rx:6}.label{font:600 13px Arial;fill:#0f172a}.arrow{stroke:#64748b;stroke-width:1.8;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker>
  </defs>
  <rect class="bg" width="1100" height="620"/>
  <text x="40" y="42" class="title">Module boundary target: reuse LearningAgent logic through ports and adapters</text>
  <rect class="layer" x="40" y="80" width="250" height="430"/>
  <text x="64" y="112" class="layerTitle">Study AI Interfaces</text>
  <rect class="box" x="70" y="145" width="190" height="58"/><text x="92" y="180" class="label">Graph Web UI</text>
  <rect class="box" x="70" y="225" width="190" height="58"/><text x="92" y="260" class="label">Upload Center</text>
  <rect class="box" x="70" y="305" width="190" height="58"/><text x="92" y="340" class="label">Review Queue</text>
  <rect class="box" x="70" y="385" width="190" height="58"/><text x="92" y="420" class="label">MCP Client</text>
  <rect class="layer" x="340" y="80" width="250" height="430"/>
  <text x="364" y="112" class="layerTitle">Study AI Backend</text>
  <rect class="box" x="370" y="145" width="190" height="58"/><text x="392" y="180" class="label">Candidate Service</text>
  <rect class="box" x="370" y="225" width="190" height="58"/><text x="392" y="260" class="label">Learning Adapter</text>
  <rect class="box" x="370" y="305" width="190" height="58"/><text x="392" y="340" class="label">RAG API</text>
  <rect class="box" x="370" y="385" width="190" height="58"/><text x="392" y="420" class="label">Audit Boundary</text>
  <rect class="layer" x="640" y="80" width="250" height="430"/>
  <text x="664" y="112" class="layerTitle">LearningAgent Engine</text>
  <rect class="box" x="670" y="145" width="190" height="58"/><text x="692" y="180" class="label">Learning Plans</text>
  <rect class="box" x="670" y="225" width="190" height="58"/><text x="692" y="260" class="label">Memory</text>
  <rect class="box" x="670" y="305" width="190" height="58"/><text x="692" y="340" class="label">Mastery</text>
  <rect class="box" x="670" y="385" width="190" height="58"/><text x="692" y="420" class="label">Evaluation</text>
  <rect class="layer" x="930" y="80" width="60" height="430"/>
  <text x="948" y="112" class="layerTitle">Ports</text>
  <rect class="port" x="910" y="145" width="130" height="48"/><text x="930" y="174" class="label">LLM</text>
  <rect class="port" x="910" y="210" width="130" height="48"/><text x="930" y="239" class="label">Embedding</text>
  <rect class="port" x="910" y="275" width="130" height="48"/><text x="930" y="304" class="label">Storage</text>
  <rect class="port" x="910" y="340" width="130" height="48"/><text x="930" y="369" class="label">Vector DB</text>
  <rect class="port" x="910" y="405" width="130" height="48"/><text x="930" y="434" class="label">Queue</text>
  <path class="arrow" d="M260 174 H370"/>
  <path class="arrow" d="M260 254 H370"/>
  <path class="arrow" d="M560 254 H670"/>
  <path class="arrow" d="M560 334 H670"/>
  <path class="arrow" d="M860 174 H910"/>
  <path class="arrow" d="M860 254 H910"/>
  <path class="arrow" d="M860 334 H910"/>
</svg>
