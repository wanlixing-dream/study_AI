<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">High concurrency LearningAgent integration flow</title>
  <desc id="desc">Request and worker flow for uploaded learning material and Study AI candidates.</desc>
  <defs>
    <style>
      .bg{fill:#fbfdff}.box{fill:#fff;stroke:#0f766e;stroke-width:1.5;rx:8}.heavy{fill:#ecfeff;stroke:#0891b2;stroke-width:1.5;rx:8}.store{fill:#f8fafc;stroke:#475569;stroke-width:1.5;rx:8}.title{font:700 18px Arial;fill:#0f172a}.label{font:600 14px Arial;fill:#0f172a}.small{font:12px Arial;fill:#475569}.arrow{stroke:#0f766e;stroke-width:2;fill:none;marker-end:url(#arrow)}.warn{stroke:#dc2626;stroke-width:2;stroke-dasharray:6 4;fill:none;marker-end:url(#redArrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#0f766e"/></marker>
    <marker id="redArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/></marker>
  </defs>
  <rect class="bg" width="1100" height="520"/>
  <text x="40" y="42" class="title">High concurrency rule: respond fast, process slow work in workers</text>
  <rect class="box" x="50" y="90" width="170" height="80"/>
  <text x="78" y="124" class="label">User</text>
  <text x="78" y="148" class="small">Upload / query / chat</text>
  <rect class="box" x="280" y="90" width="190" height="80"/>
  <text x="306" y="124" class="label">Study AI API</text>
  <text x="306" y="148" class="small">Validate, enqueue, respond</text>
  <rect class="heavy" x="540" y="80" width="190" height="100"/>
  <text x="566" y="118" class="label">Queue</text>
  <text x="566" y="144" class="small">Retries, backoff</text>
  <text x="566" y="164" class="small">Dead-letter jobs</text>
  <rect class="heavy" x="800" y="70" width="210" height="120"/>
  <text x="826" y="112" class="label">Learning Workers</text>
  <text x="826" y="140" class="small">Parse, embed, classify</text>
  <text x="826" y="162" class="small">Summarize, evaluate</text>
  <rect class="store" x="100" y="320" width="190" height="85"/>
  <text x="128" y="354" class="label">PostgreSQL</text>
  <text x="128" y="378" class="small">Transactions, audit</text>
  <rect class="store" x="370" y="320" width="190" height="85"/>
  <text x="398" y="354" class="label">pgvector</text>
  <text x="398" y="378" class="small">Search index</text>
  <rect class="store" x="640" y="320" width="190" height="85"/>
  <text x="668" y="354" class="label">Object Storage</text>
  <text x="668" y="378" class="small">Original files</text>
  <rect class="store" x="900" y="320" width="150" height="85"/>
  <text x="928" y="354" class="label">Metrics</text>
  <text x="928" y="378" class="small">p95, queue lag</text>
  <path class="arrow" d="M220 130 H280"/>
  <path class="arrow" d="M470 130 H540"/>
  <path class="arrow" d="M730 130 H800"/>
  <path class="arrow" d="M905 190 C905 250 195 250 195 320"/>
  <path class="arrow" d="M905 190 C905 260 465 260 465 320"/>
  <path class="arrow" d="M905 190 C905 270 735 270 735 320"/>
  <path class="arrow" d="M905 190 V320"/>
  <path class="warn" d="M375 170 C470 245 705 245 905 190"/>
  <text x="450" y="238" class="small">Do not run parsing, embeddings, or synthesis inside request handlers</text>
</svg>
